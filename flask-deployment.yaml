apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels:
    app: flask

spec:
  replicas: 1
  selector:
    matchlabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-container
        image: flask-app:latest
        imagePullPolicy: ifNotPresent
        ports:
          - containerPort: 5000
        envFrom:
          - secretRef: 
              name: llmops-secret

---

apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: LoadBalancer
  selector:
    app: flask
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000